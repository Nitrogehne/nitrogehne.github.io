<article id="n_piu">
영문(ENG Title), 오름차순(012 -> ABC -> !@#)으로 정리하였습니다.1<br>
<br>
<table>
  <thead>
    <tr>
      <th>Title</th>
      <th>Artist</th>
      <th>YouTube</th>
    </tr>
  </thead>
  <tbody id="n_piu_tbd">
  </tbody>
</table>
</article>
<script>
var nPIU = [
  [ "2006. LOVE SONG", "Banya Production", [
      [ "https://youtu.be/8l1SI3Ql2yw", "2006. LOVE SONG // D13 SS(1Great) // Pump It Up XX" ]
	]
  ], [ "Faster Z", "YAHPP", [
      [ "https://youtu.be/1Y8WM2zXxNE", "Faster Z // D14 S(1Good) // Pump It Up XX" ]
	]
  ], [ "HIT", "SEVENTEEN", [
      [ "https://youtu.be/e32i_ta3sks", "HIT // D7 S(1Bad) // Pump It Up XX" ]
	]
  ], [ "Jogging", "LUCY", [
      [ "https://youtu.be/7qWdr0QMtnA", "Jogging // D16 [SightRead] S(1Bad) // Pump It Up XX" ]
	]
  ],
];
nPIU.forEach(function(o, i, a){
  td = document.createElement("td");
  td.innerText = o[0];
  tr = document.createElement("tr");
  tr.appendChild(td);
  td = document.createElement("td");
  td.innerText = o[1];
  tr.appendChild(td);
  td = document.createElement("td")
  for(let i = 0; i < o[2].length; i++){
    a = document.createElement("a");
	a.href = o[2][i][0];
	a.target = "_blank";
	img = document.createElement("img");
	img.src = "https://img.youtube.com/vi/" + o[2][i][0].split("/")[3] + "/default.jpg";
	img.title = o[2][i][1];
	a.appendChild(img);
	td.appendChild(a);
  }
  tr.appendChild(td);
  document.querySelector("#n_piu #n_piu_tbd").appendChild(tr);
});
</script>
