<article id="piu_nx">
<h1>Pump It Up New Xenesis</h1>
Special thanks <a href="https://www.youtube.com/channel/UCvoGVHCiHOlK8FQigiaUJyQ" target="_blank"><img class="normal" src="img/youtube_social_icon_red.png">Vincent Kim</a>,
<a href="https://www.youtube.com/channel/UCPq5v-pM3xWNvu00DGYxVAg" target="_blank"><img class="normal" src="img/youtube_social_icon_red.png">BOSS_PIUVN Pump It Up Team</a><br>
<br>
<table id="piu_nx_tb">
  <thead>
    <tr>
      <th>Music</th>
      <th>Mode</th>
      <th>YouTube</th>
    </tr>
  </thead>
  <tbody>
  </tbody>
</table>
</article>
<style>
  #piu_nx img[src="img/youtube_social_icon_red.png"] {
    vertical-align:middle;
    width : calc(64px * 20 / 45);
	height : 20px;
  }
  #piu_nx_tb {
    border-width: 3px;
    padding: 0 1em;
    margin : auto;
    border-collapse : collapse; 
  }
  #piu_nx_tb thead {
    
  }
  #piu_nx_tb thead th {
	background-color : #000;
    padding : 0 1em;
  }
  #piu_nx_tb tbody tr.song_div {
    border-top-width : 1px;
    border-top-style : solid;
  }
  #piu_nx_tb tbody tr.head td {
    background-color : #222;
    color : #fff;
    font-weight : bold;
  }
  #piu_nx_tb tbody tr:hover {
	background-color : #222;
  }
  #piu_nx_tb tbody td {
    padding : 0 1em;
  }
  .piu_nx_no, .piu_nx_hd, .piu_nx_cz, .piu_nx_fs, .piu_nx_nm, .piu_nx_lm { font-weight : bold; }
  .piu_nx_asia, .piu_nx_namerica, .piu_nx_samerica, .piu_nx_europe { font-weight : bold; }
  .piu_nx_no{ color : khaki; }
  .piu_nx_hd{ color : dodgerblue; }
  .piu_nx_cz{ color : orangered;}
  .piu_nx_fs{ color : greenyellow;}
  .piu_nx_nm{ color : darkorchid; }
  .piu_nx_lm{ color : lightcyan; }
  .piu_nx_asia { color : DeepSkyBlue; }
  .piu_nx_namerica { color : LimeGreen; }
  .piu_nx_samerica { color : HotPink; }
  .piu_nx_europe { color : GoldenRod; }
</style>
<script>
  var tb, tr, dt_tr, td, dt_td, song;
  $.ajax({
    async : false,
    url : "doc/work/piu_nx/piu_nx_data.txt",
    success : function(rs) {
      tb = $("#piu_nx_tb tbody");
      dt_tr = rs.split("\n");
      for(let i = 0; i < dt_tr.length; i++){
        tr = $("<tr>");
        dt_td = dt_tr[i].split("|");
        if(song != dt_td[0]) {
          tr.addClass("song_div");
        }
        song = dt_td[0];
        for(let j = 0; j < dt_td.length; j++){
          td = $("<td>").html(dt_td[j]);
          if(dt_td[j] == "_H"){
            tr.addClass("head");
            td.html("");
          }else if(dt_td[j].includes("youtube.com/") || dt_td[j].includes("youtu.be/")){
            td.html($("<a href=" + dt_td[j] + " target=_blank><img src=img/youtube_social_icon_red.png></a>"));
          }else if(dt_td[j].match(/^(Another )?Normal/)){
            td.addClass("piu_nx_no");
          }else if(dt_td[j].match(/^(Another )?Hard/)){
            td.addClass("piu_nx_hd");
          }else if(dt_td[j].match(/^(Another )?Crazy/)){
            td.addClass("piu_nx_cz");
          }else if(dt_td[j].match(/^(Another )?Freestyle/)){
            td.addClass("piu_nx_fs");
          }else if(dt_td[j].match(/^(Another )?Nightmare/)){
            td.addClass("piu_nx_nm");
          }else if(dt_td[j].match(/^(Another )?LightMap/)){
            td.addClass("piu_nx_lm");
          }else if(dt_td[j].includes("Asia : ")){
            td.addClass("piu_nx_asia");
            td.html(td.html().replace("Asia : ", "A"));
          }else if(dt_td[j].includes("N. America : ")){
            td.addClass("piu_nx_namerica");
            td.html(td.html().replace("N. America : ", "N"));
          }else if(dt_td[j].includes("S. America : ")){
            td.addClass("piu_nx_samerica");
            td.html(td.html().replace("S. America : ", "S"));
          }else if(dt_td[j].includes("Eroupe : ")){
            td.addClass("piu_nx_eroupe");
            td.html(td.html().replace("Eroupe : ", "E"));
          }
          tr.append(td);
        }
        if(dt_td[0] != ""){
          tb.append(tr);
        }
      }
    },
    complete : function(rs) {
    },
    error : function(rs) {
    }
  });
</script>
